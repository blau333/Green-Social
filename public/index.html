<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <link rel="stylesheet" href="/styles.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>

</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <div class="header-title-row">
          <img id="site-logo" class="site-logo hidden" src="" alt="">
          <span class="logo-fallback">🌿</span>
          <h1>Green-Social</h1>
          <input id="logo-file" type="file" accept="image/*" style="display:none">
          <button id="btn-add-logo" type="button" class="btn-add-logo" title="Добавить логотип">📷</button>
        </div>
        <div id="welcome" class="welcome-text"></div>
        <div id="category-bar" class="category-bar"></div>
      </div>
      <div class="header-right">
        <div class="user-search-row">
          <input id="user-id-search" type="number" min="1" placeholder="User ID" aria-label="Search by user ID">
          <button id="btn-search-user" type="button" class="btn-search-user" title="Search user">🔍</button>
        </div>
        <div class="controls">
          <select id="lang-select" aria-label="language-select">
            <option value="ru">Рус</option>
            <option value="en">Eng</option>
          </select>
          <button id="theme-toggle" title="Toggle theme">Dark</button>
          <button id="profile-btn" class="hidden" title="View Profile">Profile</button>
        </div>
        <div id="auth-area"></div>
      </div>
    </header>

    <main>
      <section id="feed-page" class="page">
        <section id="create-post" class="card hidden">
          <textarea id="post-content" placeholder="Hows it going?"></textarea>
          <input id="post-category" class="post-category-input" placeholder="Category (optional)">
          <div style="margin-bottom:8px">
            <input id="post-image" type="file" accept="image/*" style="display:none">
            <input id="post-audio" type="file" accept="audio/*" style="display:none">
            <input id="post-video" type="file" accept="video/*" style="display:none">
            <button id="btn-image" title="Add image" type="button" style="background:transparent;border:1px solid #d1fae5;padding:6px 12px;border-radius:12px;cursor:pointer;margin-right:8px">📷</button>
            <button id="btn-audio" title="Add audio" type="button" style="background:transparent;border:1px solid #d1fae5;padding:6px 12px;border-radius:12px;cursor:pointer;margin-right:8px">🎵</button>
            <button id="btn-video" title="Add video" type="button" style="background:transparent;border:1px solid #d1fae5;padding:6px 12px;border-radius:12px;cursor:pointer;margin-right:8px">🎬</button>
            <button id="btn-voice-record" title="Record voice" type="button" style="background:transparent;border:1px solid #d1fae5;padding:6px 12px;border-radius:12px;cursor:pointer;margin-right:8px">🎤</button>
            <span id="voice-record-status" class="voice-status hidden"></span>
            <button id="btn-post">⬆️</button>
          </div>
        </section>

        <section id="posts"></section>
      </section>

      <section id="subscriptions-page" class="page hidden">
        <section id="subscriptions-posts"></section>
      </section>

      <section id="notifications-page" class="page hidden">
        <div id="notifications-container"></div>
      </section>
    </main>
    <nav class="tabs tabs-bottom">
      <button id="tab-feed" class="tab-btn active">📰</button>
      <button id="tab-subscriptions" class="tab-btn">👥</button>
      <button id="tab-notifications" class="tab-btn">🔔</button>
    </nav>
    <footer>
      <p>Created by blau3 and Komi</p>
      <a href="https://t.me/blau030" target="_blank">
        <img src="telegram.png" alt="Telegram" width="40">
      </a>
    </footer>
  </div>
  <script src="/app.js"></script>
</body>
</html>
