<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <link rel="stylesheet" href="/styles.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>

</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <div class="header-title-row">
          <img src="/gs-logo.png" alt="Green-Social logo" class="site-logo">
          <h1>Green-Social</h1>
        </div>
        <div id="welcome" class="welcome-text"></div>
        <div id="category-bar" class="category-bar"></div>
      </div>
      <div class="header-right">
        <div class="user-search-row">
          <button id="btn-new-story" type="button" class="icon-btn" title="New story">➕</button>
          <input id="user-id-search" type="number" min="1" placeholder="User ID" aria-label="Search by user ID">
          <button id="btn-search-user" type="button" class="btn-search-user" title="Search user">🔍</button>
        </div>
        <div class="controls">
          <img id="user-avatar" class="header-avatar hidden" src="" alt="Profile">
          <div class="settings-wrapper">
            <button id="settings-btn" type="button" class="icon-btn" aria-label="Settings" aria-haspopup="menu" aria-expanded="false" title="Settings">⚙️</button>
            <div id="settings-menu" class="settings-menu hidden" role="menu" aria-label="Settings menu">
              <div class="settings-row">
                <span id="settings-language-label" class="settings-label">Language</span>
                <select id="lang-select" aria-label="language-select">
                  <option value="ru">Рус🪆</option>
                  <option value="en">Eng💂‍♂️</option>
                </select>
              </div>
              <div class="settings-row">
                <span id="settings-theme-label" class="settings-label">Theme</span>
                <button id="theme-toggle" type="button" title="Toggle theme">Dark</button>
              </div>
              <div class="settings-divider" aria-hidden="true"></div>
              <button id="logout-btn" type="button" class="settings-logout-btn btn-primary hidden">
                Logout
              </button>
            </div>
          </div>
        </div>
        <div id="auth-area"></div>
      </div>
    </header>

    <main>
      <section id="feed-page" class="page">
        <section id="stories-bar" class="card stories-bar hidden"></section>
        <section id="create-post" class="card hidden">
          <div class="rich-editor">
            <div class="editor-toolbar">
              <button type="button" class="editor-btn" data-cmd="bold" title="Bold"><b>B</b></button>
              <button type="button" class="editor-btn" data-cmd="italic" title="Italic"><i>I</i></button>
              <button type="button" class="editor-btn" data-cmd="underline" title="Underline"><u>U</u></button>
              <button type="button" class="editor-btn" data-cmd="insertUnorderedList" title="Bullet list">• List</button>
              <button type="button" class="editor-btn" data-cmd="formatBlock" data-value="blockquote" title="Quote">❝ ❞</button>
              <button type="button" class="editor-btn" data-cmd="removeFormat" title="Clear formatting">✖</button>
            </div>
            <div id="post-editor" class="editor-area" contenteditable="true" data-placeholder="Hows it going?"></div>
          </div>
          <div class="post-category-row">
            <button id="post-category-emoji" type="button" class="emoji-picker-btn" title="Выбрать эмодзи категории">😊</button>
            <input id="post-category-text" class="post-category-input" placeholder="Category text (optional)">
          </div>
          <div class="poll-builder">
            <button id="poll-toggle-btn" type="button" class="poll-toggle-btn">+ Poll</button>
            <div id="poll-fields" class="poll-fields hidden">
              <input id="poll-question" class="poll-question-input" placeholder="Poll question">
              <div id="poll-options" class="poll-options">
                <div class="poll-option-row">
                  <input type="text" class="poll-option-input" placeholder="Option 1">
                </div>
                <div class="poll-option-row">
                  <input type="text" class="poll-option-input" placeholder="Option 2">
                </div>
              </div>
              <button id="add-poll-option" type="button" class="poll-add-option-btn">+ Add option</button>
            </div>
          </div>
          <div class="post-media-toolbar" style="margin-bottom:8px">
            <input id="post-image" type="file" accept="image/*" style="display:none">
          <input id="post-audio" type="file" accept="audio/*" style="display:none">
          <input id="post-video" type="file" accept="video/*" style="display:none">
          <button id="btn-image" title="Add image" type="button" style="background:transparent;border:1px solid #d1fae5;padding:6px 12px;border-radius:12px;cursor:pointer;margin-right:8px">📷</button>
          <button id="btn-audio" title="Add audio" type="button" style="background:transparent;border:1px solid #d1fae5;padding:6px 12px;border-radius:12px;cursor:pointer;margin-right:8px">🎵</button>
          <button id="btn-video" title="Add video" type="button" style="background:transparent;border:1px solid #d1fae5;padding:6px 12px;border-radius:12px;cursor:pointer;margin-right:8px">🎬</button>
            <button id="btn-post">⬆️</button>
          </div>
        </section>

        <section id="posts"></section>
      </section>

      <section id="subscriptions-page" class="page hidden">
        <section id="subscriptions-posts"></section>
      </section>

      <section id="notifications-page" class="page hidden">
        <div id="notifications-container"></div>
      </section>

      <section id="profile-page" class="page hidden">
        <!-- Заполняется динамически в showProfile в app.js -->
      </section>
    </main>
    <nav class="tabs tabs-bottom">
      <button id="tab-feed" class="tab-btn active">📰</button>
      <button id="tab-subscriptions" class="tab-btn">👥</button>
      <button id="tab-notifications" class="tab-btn">🔔</button>
    </nav>
    <button id="scroll-top-btn" class="scroll-top-btn hidden" type="button" title="Back to top">⬆️</button>
    <footer>
      <p>Created by blau3 and Komi</p>
      <a href="https://t.me/blau030" target="_blank">
        <img src="telegram.png" alt="Telegram" width="40">
      </a>
    </footer>
  </div>
  <script src="/app.js"></script>
</body>
</html>
