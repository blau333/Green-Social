services:
  - type: web
    name: green-social
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: JWT_SECRET
        sync: false
    disk:
      name: green-social-data
      mountPath: /var/data
      sizeGB: 1
